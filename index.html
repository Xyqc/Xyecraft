<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XyeCraft</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #111;
      color: #eee;
      line-height: 1.6;
    }
    h1 {
      color: #6ee7b7;
    }
    .button {
      display: inline-block;
      padding: 12px 20px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
    .card {
      background: #1b1b1b;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>XyeCraft</h1>
  <p>A block-building survival game for PC.</p>

  <div class="card">
    <h2>Download</h2>
    <p>Get the latest Windows installer below.</p>
    <a class="button" href="https://github.com/yourusername/yourrepo/releases/latest">
      Download Installer
    </a>
  </div>

  <div class="card">
    <h2>Installation</h2>
    <p>Download the installer, run it, and follow the setup steps.</p>
  </div>

  <div class="card">
    <h2>Patch Notes</h2>
    <p>Version 1.0.0 Beta: Initial public release.</p>
  </div>
</body>
</html>
